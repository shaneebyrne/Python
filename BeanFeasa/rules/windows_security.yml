---
id: win-security-007
title: Security Log Cleared (EID 1102 / 517)
description: >
  The Windows Security or System audit log was deliberately cleared.
  EID 1102 = Security log cleared (Windows Vista+).
  EID 517 = Security log cleared (legacy Windows XP/2003).
  STRICT: requires BOTH correct EID AND Microsoft-Windows-Eventlog source.
  Previous versions caused catastrophic false positives by matching
  Security channel broadly — every logon/logoff/privilege event (4624,
  4625, 4672, 4611, 4634 etc.) was labelled 'Security Log Cleared'.
  The only genuine source for log-clear events is Microsoft-Windows-Eventlog.
level: critical
author: BeanFeasa
tags:
  - attack.defense_evasion
  - attack.t1070.001
detection:
  selection:
    event_id|equals:
      - "1102"
      - "517"
    source|equals:
      - "Microsoft-Windows-Eventlog"
  condition: selection
---
id: win-security-008
title: Pass the Hash Indicator
description: Detects logon type 9 (NewCredentials) with NTLM auth, which may indicate Pass-the-Hash.
level: high
author: BeanFeasa
tags:
  - attack.lateral_movement
  - attack.t1550.002
detection:
  logon_type:
    message|contains:
      - "Logon Type:		9"
      - "LogonType=9"
  auth_package:
    message|contains:
      - "NTLM"
  condition: logon_type and auth_package

---
id: win-security-009
title: RDP Lateral Movement
description: Detects Event ID 4624 with Logon Type 10 (RemoteInteractive) indicating RDP sessions.
level: medium
author: BeanFeasa
tags:
  - attack.lateral_movement
  - attack.t1021.001
detection:
  event:
    event_id|equals:
      - "4624"
  rdp:
    message|contains:
      - "Logon Type:		10"
      - "LogonType=10"
  condition: event and rdp

---
id: win-security-010
title: Mimikatz Indicators
description: Detects common Mimikatz-related strings in log messages.
level: critical
author: BeanFeasa
tags:
  - attack.credential_access
  - attack.t1003
detection:
  selection:
    message|contains:
      - "mimikatz"
      - "sekurlsa"
      - "kerberos::list"
      - "lsadump"
      - "privilege::debug"
      - "token::elevate"
  condition: selection
