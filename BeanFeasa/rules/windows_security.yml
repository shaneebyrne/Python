# ────────────────────────────────────────────────
# BeanFeasa Sample Rules — Windows Security
# Sigma-inspired YAML detection format
# ────────────────────────────────────────────────

---
id: win-security-001
title: Suspicious PowerShell Execution
description: Detects PowerShell commands with encoded or obfuscated execution patterns.
level: high
author: BeanFeasa
tags:
  - attack.execution
  - attack.t1059.001
detection:
  selection:
    message|contains:
      - "-EncodedCommand"
      - "-enc "
      - "FromBase64String"
      - "IEX("
      - "Invoke-Expression"
      - "powershell -e "
      - "bypass -nop"
      - "downloadstring"
      - "Net.WebClient"
      - "bitstransfer"
  condition: selection

---
id: win-security-002
title: Account Logon Failure (Event 4625)
description: >
  Detects Event ID 4625 (failed logon). CONTEXT REQUIRED: Check
  logon type (3/10 = network/RDP = suspicious, 2/11 = local/cached
  = usually benign), source address (::1/127.0.0.1 = localhost = not
  brute force), and caller process (consent.exe = UAC prompt, not
  attack). Only flag as brute force when failures come from remote
  IPs with network logon types.
level: medium
author: BeanFeasa
tags:
  - attack.credential_access
  - attack.t1110
detection:
  selection:
    event_id|equals:
      - "4625"
  condition: selection

---
