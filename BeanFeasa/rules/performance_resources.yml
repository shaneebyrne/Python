---
id: perf-log-001
title: Event Log Full / Overflow (Event 1104, 1105)
description: >
  An event log channel has reached capacity. New events may be
  lost until the log is cleared or expanded.
level: medium
author: BeanFeasa
tags:
  - performance.logging
  - event.log
detection:
  selection:
    event_id|equals:
      - "1104"
      - "1105"
  condition: selection

---
id: perf-log-002
title: Event Log Service Error / Log Full
description: >
  The Event Log service has encountered errors or a log is full.
  PREVIOUSLY BROKEN: fired on EID 6005 (Event Log service started —
  a clean post-boot success event) because the rule matched on
  'EventLog' in the message with no severity filter.
  Fix: require error-level messages and exclude EID 6005 (start success).
  EID 6005 + prior EID 6008 (unexpected shutdown) is handled by chain-lockup.
level: high
author: BeanFeasa
tags:
  - performance.logging
  - eventlog
detection:
  log_error:
    source|contains:
      - "EventLog"
      - "Microsoft-Windows-Eventlog"
    message|contains:
      - "log file is full"
      - "maximum log size"
      - "log file corrupt"
      - "logging stopped"
      - "failed to write"
      - "cannot be opened"
  filter_start_event:
    event_id|equals:
      - "6005"
      - "6006"
      - "6009"
  condition: log_error and not filter_start_event
---
id: perf-print-001
title: Print Spooler Error / Crash
description: >
  The Print Spooler service has crashed or encountered an error.
  HttpService URL group management events (EIDs 111/112/113/114/117)
  are excluded — these are normal WSD print listener URL reservation
  operations that appear even during healthy print spooler operation.
  The executable path in HttpService messages contains 'spoolsv.exe'
  which previously matched the keyword filter on every boot cycle.
level: medium
author: BeanFeasa
tags:
  - performance.print
  - spooler
detection:
  spooler_crash:
    event_id|equals:
      - "7031"
      - "7034"
    source|contains:
      - "Service Control Manager"
    message|contains:
      - "Print Spooler"
      - "Spooler"
  spooler_faulting:
    event_id|equals:
      - "1000"
      - "1001"
    source|contains:
      - "Application Error"
      - "Windows Error Reporting"
    message|contains:
      - "spoolsv.exe"
  filter_http_service:
    source|contains:
      - "Microsoft-Windows-HttpService"
      - "HttpService"
  condition: (spooler_crash or spooler_faulting) and not filter_http_service
---
id: perf-gpo-001
title: Group Policy Processing Failure (Event 1085, 1125, 1129)
