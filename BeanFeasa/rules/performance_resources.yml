---
id: perf-boot-001
title: Slow Boot / Shutdown Detected
description: >
  System boot or shutdown took abnormally long, indicating driver,
  service, or hardware issues. Scoped to boot performance event sources
  (Diagnostics-Performance, Winlogon, User32 shutdown).
  PREVIOUSLY BROKEN: fired on Security EID 4624 (account logon success)
  because 'Winlogon' appeared in some logon event messages as the
  calling process. Fix: require boot performance sources/channels.
level: low
author: BeanFeasa
tags:
  - performance.boot
  - startup
detection:
  boot_perf_source:
    source|contains:
      - "Microsoft-Windows-Diagnostics-Performance"
      - "Microsoft-Windows-Winlogon"
    message|contains:
      - "boot time"
      - "boot performance"
      - "boot degradation"
      - "slow boot"
      - "shutdown time"
      - "startup"
      - "degraded"
  filter_logon:
    event_id|equals:
      - "4624"
      - "4625"
      - "4634"
      - "4647"
    source|contains:
      - "Microsoft-Windows-Security-Auditing"
  condition: boot_perf_source and not filter_logon
---
id: perf-shutdown-001
title: Unexpected Shutdown / Restart Reason
description: >
  System shutdown or restart was initiated with a recorded reason
  code. Tracks planned vs unplanned restarts.
level: low
author: BeanFeasa
tags:
  - performance.shutdown
  - restart
detection:
  selection:
    event_id|equals:
      - "1074"
      - "6006"
      - "6008"
    source|contains:
      - "User32"
      - "EventLog"
  condition: selection

---
id: perf-linux-oom-001
title: Linux OOM Killer Activated
description: >
  The Linux OOM (Out of Memory) killer has terminated a process
  to free memory. System was critically low on RAM.
level: critical
author: BeanFeasa
tags:
  - performance.linux
  - oom
detection:
  selection:
    message|contains:
      - "Out of memory"
      - "oom-kill"
      - "oom_kill"
      - "Killed process"
      - "invoked oom-killer"
      - "oom_score"
  condition: selection
