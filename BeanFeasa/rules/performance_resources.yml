# ────────────────────────────────────────────────
# BeanFeasa Rules — Performance & Resources
# Covers: Memory exhaustion, CPU saturation,
#         Disk space, Handle/thread leaks, Pool
#         exhaustion, Pagefile, Process crashes,
#         Event log overflow, Print spooler
# ────────────────────────────────────────────────

---
id: perf-mem-001
title: Low Memory / Memory Exhaustion
description: >
  System is running critically low on physical or virtual memory.
  Applications may fail to allocate memory.
level: high
author: BeanFeasa
tags:
  - performance.memory
  - resource.exhaustion
detection:
  selection:
    message|contains:
      - "low on memory"
      - "out of memory"
      - "memory exhaustion"
      - "insufficient memory"
      - "commit limit"
      - "memory pressure"
      - "oom-killer"
      - "Cannot allocate memory"
      - "insufficient system resources"
  condition: selection

---
id: perf-mem-002
title: Resource Exhaustion Warning (Event 2004)
description: >
  Windows Resource Exhaustion Detector has flagged low resources.
  Event 2004 = virtual memory running low.
level: high
author: BeanFeasa
tags:
  - performance.memory
  - resource.warning
detection:
  selection:
    event_id|equals:
      - "2004"
    source|contains:
      - "Resource-Exhaustion"
      - "srv"
  condition: selection

---
id: perf-mem-003
title: Nonpaged / Paged Pool Exhaustion
description: >
  Kernel pool memory (nonpaged or paged) is exhausted. Can cause
  system instability and BSOD.
level: critical
author: BeanFeasa
tags:
  - performance.kernel
  - pool.exhaustion
detection:
  selection:
    message|contains:
      - "nonpaged pool"
      - "paged pool"
      - "pool allocation"
      - "pool tag"
      - "pool exhaustion"
      - "ran out of pool"
      - "system PTE"
  condition: selection

---
id: perf-mem-004
title: Pagefile Usage Critical
description: >
  Pagefile utilization has reached critical levels or the system
  has failed to extend the pagefile.
level: high
author: BeanFeasa
tags:
  - performance.pagefile
  - virtual.memory
detection:
  selection:
    message|contains:
      - "pagefile"
      - "page file"
      - "paging file"
      - "swap"
      - "swappiness"
      - "swap space"
  condition: selection

---
id: perf-cpu-001
title: Sustained High CPU Usage
