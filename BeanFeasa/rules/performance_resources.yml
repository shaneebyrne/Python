  Group Policy processing has failed, which can result in
  misconfigured security settings and missing drive maps.
level: high
author: BeanFeasa
tags:
  - performance.gpo
  - policy
detection:
  selection:
    event_id|equals:
      - "1085"
      - "1125"
      - "1126"
      - "1129"
    source|contains:
      - "GroupPolicy"
      - "Group Policy"
  condition: selection

